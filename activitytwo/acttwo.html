<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Card</title>
    <link rel="stylesheet" href="acttwo.css">
</head>

<body>

<div class="card">

    <button class="cart-btn">Add to Cart</button>

</div>
<script></script>
</body>
</html>
